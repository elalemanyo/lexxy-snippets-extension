<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lexxy Snippets Extension</title>
    <meta name="description" content="Snippets toolbar extension for Lexxy editors.">
    <meta property="og:image" content="https://elalemanyo.github.io/lexxy-snippets-extension/og_image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://elalemanyo.github.io/lexxy-snippets-extension/og_image.jpg">
    <link rel="icon" href="https://fav.farm/✍️" />
    <link rel="stylesheet" href="https://esm.sh/@37signals/lexxy@0.9.25/dist/stylesheets/lexxy.css">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html {
        font-family: system-ui, sans-serif;
        font-size: clamp(15px, 1.2vw, 20px);
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
      }

      body {
        margin: 0;
        max-width: 1400px;
        margin-inline: auto;
        padding: 0 20px;
      }

      img, picture, video, canvas, svg {
        display: block;
        max-width: 100%;
      }

      input, button, textarea, select {
        font: inherit;
      }

      p, h1, h2, h3, h4, h5, h6 {
        overflow-wrap: break-word;
      }

      h1 {
        text-wrap: balance;
      }

      .title,
      .description {
        text-align: center;
      }

      .title {
        margin-block: 48px 0;
      }

      .links {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-block: 10px 0;
      }

      .links svg {
        width: 25px;
        height: 24px;
      }

      lexxy-editor {
        display: block;
        margin: 24px 0;
      }

      code {
        background: #f3f4f6;
        border-radius: 4px;
        padding: 2px 4px;
      }
    </style>
  </head>
  <body>
    <h1 class="title">Lexxy Snippets Extension</h1>

    <lexxy-editor data-snippets='[{"label":"Greeting","insert":"Hello!", "icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 18 18\" fill=\"none\"><path stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" fill=\"none\" d=\"m8.25 12.75 1.5 1.5A1.592 1.592 0 0 0 12 12\"/><path stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" fill=\"none\" d=\"m10.497 10.5 1.875 1.875a1.591 1.591 0 0 0 2.25-2.25l-2.91-2.91a2.25 2.25 0 0 0-3.18 0l-.66.66a1.591 1.591 0 1 1-2.25-2.25L7.73 3.518a4.34 4.34 0 0 1 5.295-.653l.352.21c.32.193.7.26 1.065.188L15.747 3\"/><path stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" fill=\"none\" d=\"m15.75 2.25.75 8.25H15M2.25 2.25 1.5 10.5l4.875 4.875a1.59 1.59 0 1 0 2.25-2.25M2.25 3h6\"/></svg>"},{"label":"Signature","insert":"Best,\nDHH", "icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 18 18\" fill=\"none\"><path stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" fill=\"none\" d=\"m15.75 12.75-1.617-1.402a.374.374 0 0 0-.633.276V12a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1-.75-.75c0-1.909-2.993-2.977-6.375-3a1.875 1.875 0 0 0 0 3.75c3.115 0 3.559-8.471 4.281-10.125a1.875 1.875 0 1 1 2.483 2.463M2.25 15.75h13.5\"/></svg>"}]' class="lexxy-content"></lexxy-editor>

    <p class="description">
      This extension adds a snippets menu to Lexxy editors that provide a
      <code>data-snippets</code> JSON array. Editors without snippets are left unchanged.
    </p>
    <div class="links">
      <a href="https://github.com/elalemanyo/lexxy-snippets-extension" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98 96" fill="none"><g clip-path="url(#a)"><path fill="#000" d="M41.44 69.385C28.807 67.853 19.906 58.762 19.906 46.99c0-4.785 1.723-9.953 4.594-13.398-1.244-3.158-1.053-9.858.383-12.633 3.828-.479 8.996 1.531 12.058 4.307 3.637-1.149 7.465-1.723 12.155-1.723s8.517.574 11.963 1.627c2.966-2.68 8.23-4.69 12.058-4.211 1.34 2.584 1.531 9.283.287 12.537 3.063 3.637 4.69 8.518 4.69 13.494 0 11.772-8.9 20.672-21.725 22.3 3.254 2.104 5.455 6.698 5.455 11.962v9.953c0 2.871 2.393 4.498 5.264 3.35C84.41 87.95 98 70.629 98 49.19 98 22.107 75.988 0 48.904 0S0 22.107 0 49.191c0 21.246 13.494 38.856 31.678 45.46 2.584.956 5.072-.766 5.072-3.35v-7.657c-1.34.575-3.062.958-4.594.958-6.316 0-10.049-3.446-12.728-9.858-1.053-2.584-2.201-4.115-4.403-4.402-1.148-.096-1.53-.574-1.53-1.149 0-1.148 1.913-2.01 3.827-2.01 2.776 0 5.168 1.723 7.657 5.264 1.914 2.776 3.923 4.02 6.316 4.02s3.924-.861 6.125-3.063c1.627-1.627 2.871-3.062 4.02-4.02"/></g><defs><clipPath id="a"><path fill="#fff" d="M0 0h98v96H0z"/></clipPath></defs></svg>
      </a>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@37signals/lexxy": "https://esm.sh/@37signals/lexxy@0.9.25",
          "lexxy-snippets-extension": "./snippets_extension.js"
        }
      }
    </script>

    <script type="module">
      import { configure } from "@37signals/lexxy"
      import { SnippetsExtension } from "lexxy-snippets-extension"

      configure({ global: { extensions: [SnippetsExtension] } })
    </script>
  </body>
</html>
